name = "rs-notion-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Secretsはコマンドラインで設定：
#   wrangler secret put NOTION_API_KEY
#   wrangler secret put NOTION_DATABASE_ID
#
# デプロイ:
#   wrangler deploy
#
# ローカルテスト:
#   wrangler dev --var NOTION_API_KEY:secret_xxx --var NOTION_DATABASE_ID:xxx
